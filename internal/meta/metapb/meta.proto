syntax = "proto3";

// Package zuul.meta is the wire format for Zuul's meta shard: a small replicated
// map from replica id to that node's addresses. It is the cluster's own topology
// record (distinct from dragonboat's Raft membership), letting any node resolve a
// shard leader's client-facing forwarding address — including for nodes added at
// runtime, whose addresses no static config could know.
package zuul.meta;

option go_package = "github.com/johnsiilver/zuul/internal/meta/metapb;metapb";

// Member is one node's entry in the topology.
message Member {
	// replica_id is the node's stable replica id within every shard.
	uint64 replica_id = 1;
	// raft_address is the dragonboat Raft transport address (host:port).
	string raft_address = 2;
	// zuul_grpc_address is the node's client-facing / forwarding gRPC address.
	string zuul_grpc_address = 3;
	// node_host_id is the dragonboat NodeHostID (used in gossip addressing).
	string node_host_id = 4;
}

// MetaCommand is one meta-shard Raft log entry: exactly one field is set.
message MetaCommand {
	oneof cmd {
		// put adds or updates a member.
		Member put = 1;
		// delete removes the member with this replica id.
		uint64 delete = 2;
	}
}

// MetaResult is returned from applying a MetaCommand.
message MetaResult {
	// revision is the meta-store logical clock after the command was applied.
	uint64 revision = 1;
}

// MetaSnapshot is the full meta-store state for SaveSnapshot / RecoverFromSnapshot.
message MetaSnapshot {
	// revision is the meta-store logical clock.
	uint64 revision = 1;
	// members is every known member, sorted by replica id.
	repeated Member members = 2;
}
